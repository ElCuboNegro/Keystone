name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  adr-gate:
    name: ADR Gate — library changes require a new ADR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed and new files
        id: diff
        run: |
          BASE=${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD=${{ github.sha }}
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          NEW=$(git diff --name-only --diff-filter=A "$BASE" "$HEAD" 2>/dev/null || git diff --name-only --diff-filter=A HEAD~1 HEAD)
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "new_files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run ADR gate
        run: |
          python tools/check_adr_gate.py \
            --changed-files "${{ steps.diff.outputs.changed }}" \
            --new-files "${{ steps.diff.outputs.new_files }}" \
            --commit-message "${{ github.event.head_commit.message || '' }}"

  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    needs: adr-gate

    strategy:
      matrix:
        python-version: ["__PYTHON_VERSION__"]

    defaults:
      run:
        working-directory: __LIBRARY_PATH__

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check __PACKAGE_NAME__/ tests/ || true

      - name: Type check
        run: mypy __PACKAGE_NAME__/ || true

      - name: Run tests
        run: pytest tests/ -v --tb=short
