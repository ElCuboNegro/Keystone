name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  adr-gate:
    name: ADR Gate — library changes require a new ADR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for diff

      - name: Get changed files
        id: diff
        run: |
          BASE=${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD=${{ github.sha }}
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # New ADR files added in this commit
          NEW=$(git diff --name-only --diff-filter=A "$BASE" "$HEAD" 2>/dev/null || git diff --name-only --diff-filter=A HEAD~1 HEAD)
          echo "new_files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run ADR gate
        run: |
          python retro/tools/check_adr_gate.py \
            --changed-files "${{ steps.diff.outputs.changed }}" \
            --new-files "${{ steps.diff.outputs.new_files }}" \
            --commit-message "${{ github.event.head_commit.message || '' }}"

  test:
    name: Test & Lint
    # PC/SC (WinSCard) is only available natively on Windows.
    # Linux jobs would need pcsc-lite — add a separate job when porting is complete.
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: library

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,vault]"

      - name: Lint (ruff)
        run: ruff check keystone_nfc/ folder_lock.py tests/

      - name: Type check (mypy)
        run: mypy keystone_nfc/

      - name: Run tests (hardware-free)
        # @pytest.mark.hardware tests require a physical card — skipped in CI
        run: pytest tests/ -m "not hardware" -v --tb=short

  linux-import:
    name: Import check (Linux / pcsc-lite path)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: library

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pcsc-lite headers
        run: sudo apt-get install -y libpcsclite-dev pcscd
        working-directory: .

      - name: Install package
        run: pip install -e ".[dev,vault]"

      - name: Verify import succeeds
        run: python -c "import keystone_nfc; print('import OK')"

      - name: Run non-hardware, non-Windows tests
        run: pytest tests/ -m "not hardware" -v --tb=short
